name: Feature request
description: Suggest a new capability for Memgentic
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping shape Memgentic! For open-ended ideas, consider starting a [Discussion](https://github.com/Chariton-kyp/Memgentic/discussions) first.
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched existing issues and Discussions for duplicates.
          required: true
        - label: This feature aligns with Memgentic's local-first, source-aware scope.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user-visible problem does this solve? Avoid proposing a solution here.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should it work? Include API shape, CLI syntax, or UI sketch if relevant.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why you rejected them.
  - type: dropdown
    id: scope
    attributes:
      label: Primary scope
      multiple: true
      options:
        - Core engine (memgentic)
        - REST API (memgentic-api)
        - Native acceleration (memgentic-native)
        - Dashboard (Next.js)
        - MCP tools
        - New adapter (specify which platform in description)
        - Skills system
        - Knowledge graph
        - Docs
    validations:
      required: true
  - type: checkboxes
    id: willingness
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR implementing this feature.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, prior art, related ecosystem projects, etc.
