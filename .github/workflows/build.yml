name: Build sanity

# Runs on PRs and pushes to main to satisfy the "build" required status check
# in the repo ruleset — unblocks plain merges without --admin override.
# Does NOT publish; publishing only happens via release.yml on vX.Y.Z tags.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # This job MUST be named "build" — the repo ruleset requires this exact name.
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install workspace dependencies
        run: uv sync --dev

      - name: Build packages (dry-run — no publish)
        run: |
          uv build --package memgentic --out-dir dist/
          uv build --package memgentic-api --out-dir dist/

      - name: List artifacts
        run: ls -lh dist/
