name: Release Native (Rust wheel)

on:
  push:
    tags:
      # Only native-v* tags release the native wheel. We used to also
      # trigger on "v*" (core releases), but that tried to re-publish
      # whatever was in memgentic-native/Cargo.toml every time the core
      # bumped without matching the native crate version — causing a
      # PyPI "400 File already exists" on every core release (observed
      # on the v0.5.0 push). The two packages release independently
      # now: bump Cargo.toml + pyproject.toml and push `native-vX.Y.Z`.
      - "native-v*"

permissions:
  contents: read   # base — jobs escalate as needed

concurrency:
  group: release-native-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Version guard ────────────────────────────────────────────────
  verify-version:
    name: Verify tag matches native Cargo.toml + pyproject.toml
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check version matches tag
        run: |
          TAG="${GITHUB_REF_NAME}"             # native-v0.7.0
          VERSION="${TAG#native-v}"            # 0.7.0
          CARGO_VERSION=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('memgentic-native/Cargo.toml').read_text())
          print(data['package']['version'])
          ")
          PY_VERSION=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('memgentic-native/pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          echo "Tag version  : $VERSION"
          echo "Cargo.toml   : $CARGO_VERSION"
          echo "pyproject    : $PY_VERSION"
          if [ "$VERSION" != "$CARGO_VERSION" ] || [ "$VERSION" != "$PY_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match in-tree version. Aborting."
            exit 1
          fi

      - name: Check version not already on PyPI
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#native-v}"
          python3 - "$VERSION" <<'PYEOF'
          import sys, json, urllib.request, urllib.error
          version = sys.argv[1]
          try:
              with urllib.request.urlopen(
                  "https://pypi.org/pypi/memgentic-native/json", timeout=15
              ) as r:
                  data = json.load(r)
              if version in data.get("releases", {}):
                  sys.stderr.write(
                      f"::error::memgentic-native=={version} already on PyPI. Refusing to re-publish.\n"
                  )
                  sys.exit(1)
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise
          print(f"OK — memgentic-native=={version} not yet on PyPI")
          PYEOF

  # ── 2. Build wheels on each platform ───────────────────────────────
  linux:
    name: Build Linux wheels
    needs: verify-version
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  macos:
    name: Build macOS wheels
    needs: verify-version
    runs-on: macos-14
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  windows:
    name: Build Windows wheels
    needs: verify-version
    runs-on: windows-2022
    strategy:
      matrix:
        target: [x64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  sdist:
    name: Build sdist
    needs: verify-version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build sdist
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1
        with:
          working-directory: memgentic-native
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: memgentic-native/dist/

  sbom:
    name: Generate SBOM (CycloneDX)
    needs: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Build SBOM
        working-directory: memgentic-native
        run: |
          pip install cyclonedx-bom
          mkdir -p sbom
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#native-v}"
          cyclonedx-py environment \
            --output-format json \
            --output-file "sbom/sbom-memgentic-native-${VERSION}.cdx.json" \
            --spec-version 1.6 \
            .
          ls -lh sbom/
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: memgentic-native/sbom/
          if-no-files-found: error

  publish:
    name: Publish memgentic-native to PyPI
    needs: [linux, macos, windows, sdist, sbom]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      attestations: write
    environment:
      # Must match the Trusted Publisher environment registered for
      # `memgentic-native` on PyPI. Core uses `pypi`, api uses
      # `pypi-api`, native uses `pypi-native` — one GitHub environment
      # per PyPI project so the OIDC claim (which includes the env
      # name) is distinct per publisher.
      name: pypi-native
      url: https://pypi.org/p/memgentic-native
    steps:
      # Pull wheels + sdist ONLY. The `sbom` artifact must NOT land here
      # or twine will try to upload the .cdx.json as a distribution.
      - uses: actions/download-artifact@v8
        with:
          path: wheels/
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: sdist
          path: wheels/
      - name: List artifacts
        run: ls -lh wheels/
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            wheels/*.whl
            wheels/*.tar.gz
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Wheels + sdist only; cyclonedx SBOM goes to the GitHub Release.
          packages-dir: wheels/

  github-release:
    name: Create GitHub Release (attach wheels + SBOM)
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" -o -name "*.cdx.json" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Extract CHANGELOG section
        id: changelog
        run: |
          TAG="${GITHUB_REF_NAME}"         # native-v0.6.0
          VERSION="${TAG#native-v}"        # 0.6.0
          CHANGELOG_PATH="memgentic-native/CHANGELOG.md"
          if [ ! -f "$CHANGELOG_PATH" ]; then
            CHANGELOG_PATH="CHANGELOG.md"
          fi
          BODY=$(python3 - "$VERSION" "$CHANGELOG_PATH" <<'PYEOF'
          import re, sys, pathlib
          version = sys.argv[1]
          path = pathlib.Path(sys.argv[2])
          text = path.read_text() if path.exists() else ""
          pattern = (
              r"^##\s+\[" + re.escape(version) + r"\][^\n]*\n"
              r"(.*?)"
              r"(?=^##\s|\Z)"
          )
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if m:
              body = m.group(1).strip()
              print(body if body else "See CHANGELOG.md")
          else:
              print("See CHANGELOG.md")
          PYEOF
          )
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
