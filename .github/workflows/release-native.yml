name: Release Native (Rust wheel)

on:
  push:
    tags:
      # Only native-v* tags release the native wheel. We used to also
      # trigger on "v*" (core releases), but that tried to re-publish
      # whatever was in memgentic-native/Cargo.toml every time the core
      # bumped without matching the native crate version — causing a
      # PyPI "400 File already exists" on every core release (observed
      # on the v0.5.0 push). The two packages release independently
      # now: bump Cargo.toml + pyproject.toml and push `native-vX.Y.Z`.
      - "native-v*"

permissions:
  id-token: write  # required for PyPI trusted publishing
  contents: read

jobs:
  linux:
    name: Build Linux wheels
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  macos:
    name: Build macOS wheels
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  windows:
    name: Build Windows wheels
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheels with maturin
        uses: PyO3/maturin-action@v1
        with:
          working-directory: memgentic-native
          target: ${{ matrix.target }}
          args: --release --out dist --interpreter python${{ matrix.python-version }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}-${{ matrix.python-version }}
          path: memgentic-native/dist/

  sdist:
    name: Build sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          working-directory: memgentic-native
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: memgentic-native/dist/

  sbom:
    name: Generate SBOM (CycloneDX)
    needs: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build SBOM
        working-directory: memgentic-native
        run: |
          pip install cyclonedx-bom
          mkdir -p sbom
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#native-v}"
          cyclonedx-py environment \
            --output-format json \
            --output-file "sbom/sbom-memgentic-native-${VERSION}.cdx.json" \
            --spec-version 1.6 \
            .
          ls -lh sbom/
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: memgentic-native/sbom/
          if-no-files-found: error

  publish:
    name: Publish memgentic-native to PyPI
    needs: [linux, macos, windows, sdist, sbom]
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      attestations: write
    environment:
      # Must match the Trusted Publisher environment registered for
      # `memgentic-native` on PyPI. Core uses `pypi`, api uses
      # `pypi-api`, native uses `pypi-native` — one GitHub environment
      # per PyPI project so the OIDC claim (which includes the env
      # name) is distinct per publisher.
      name: pypi-native
      url: https://pypi.org/p/memgentic-native
    steps:
      # Pull wheels + sdist ONLY. The `sbom` artifact must NOT land here
      # or twine will try to upload the .cdx.json as a distribution.
      - uses: actions/download-artifact@v4
        with:
          path: wheels/
          pattern: "wheels-*"
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: wheels/
      - name: List artifacts
        run: ls -lh wheels/
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            wheels/*.whl
            wheels/*.tar.gz
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Wheels + sdist only; cyclonedx SBOM goes to the GitHub Release.
          packages-dir: wheels/

  github-release:
    name: Create GitHub Release (attach wheels + SBOM)
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \( -name "*.whl" -o -name "*.tar.gz" -o -name "*.cdx.json" \) -exec cp {} release-assets/ \;
          ls -lh release-assets/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
