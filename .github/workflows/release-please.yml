name: Release Please

# Scans commits since the last release, opens or updates a "chore(main): release X.Y.Z"
# PR with version bumps and CHANGELOG. When merged, creates git tags (v*, api-v*,
# native-v*) that fire the existing publish workflows.
#
# Linked versioning: all 3 packages (memgentic, memgentic-api, memgentic-native)
# always bump together. See .release-please-config.json and
# docs/architecture/release-automation.md.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: Open / update Release PR
    runs-on: ubuntu-24.04
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # ``RELEASE_PLEASE_TOKEN`` is a personal access token with
          # ``contents: write`` + ``pull_requests: write`` scopes on this
          # repo. Falling back to ``GITHUB_TOKEN`` silently regresses
          # release automation — tags pushed by GITHUB_TOKEN do NOT
          # trigger the downstream ``release*.yml`` publish workflows
          # (GitHub's recursive-workflow guard). v0.7.0 hit this: tags
          # landed, zero publish jobs fired, PyPI stayed stale until we
          # re-pushed with a user-auth token.
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Summary
        if: always()
        env:
          PATHS_RELEASED: ${{ steps.release.outputs.paths_released }}
          RELEASES_CREATED: ${{ steps.release.outputs.releases_created }}
          PR: ${{ steps.release.outputs.pr }}
        run: |
          {
            echo "## Release Please"
            echo ""
            echo "- paths_released: ${PATHS_RELEASED:-none}"
            echo "- releases_created: ${RELEASES_CREATED:-false}"
            echo "- pr: ${PR:-none}"
          } >> "$GITHUB_STEP_SUMMARY"
