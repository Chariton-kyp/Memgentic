name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Run core tests
        timeout-minutes: 10
        run: |
          uv run pytest memgentic/tests/ -v \
            --timeout=30 --timeout-method=thread \
            --cov=memgentic --cov-report=term-missing \
            --ignore=memgentic/tests/test_benchmarks.py \
            --ignore=memgentic/tests/test_daemon.py \
            --ignore=memgentic/tests/test_mcp_server.py \
            --ignore=memgentic/tests/test_integration.py \
            --ignore=memgentic/tests/test_observability.py \
            --ignore=memgentic/tests/test_embedder.py \
            --ignore=memgentic/tests/test_pipeline.py \
            --ignore=memgentic/tests/test_init_wizard.py
      - name: Run API tests
        timeout-minutes: 5
        run: |
          uv run pytest memgentic-api/tests/ -q \
            --timeout=60 --timeout-method=thread
      - name: Run benchmark harness tests (unit only — no dataset downloads)
        timeout-minutes: 3
        # Phase-1 benchmark harness: scorers, corpus loader, and
        # harness-lifecycle unit tests. Full benchmark runs are NOT in CI
        # — see benchmarks/README.md for the reproducibility story.
        run: |
          uv run pytest benchmarks/tests/ -q \
            --timeout=30 --timeout-method=thread

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check memgentic/ memgentic-api/ benchmarks/
      - name: Format check
        run: uv run ruff format --check memgentic/ memgentic-api/ benchmarks/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Type check
        run: uv run pyright memgentic/memgentic/ --project memgentic

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Install dependencies
        run: uv sync --dev
      - name: Security scan (bandit — HIGH severity only)
        # -lll = report only HIGH severity. Medium/Low are surfaced in
        # developer editors but don't block CI.
        run: uv run pip install bandit && uv run bandit -r memgentic/memgentic/ memgentic-api/memgentic_api/ -lll -q
      - name: Dependency audit (pip-audit — advisory)
        # Upstream vulnerabilities are tracked, not gated; upgrade via Dependabot.
        continue-on-error: true
        run: uv run pip install pip-audit && uv run pip-audit

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create .env for Docker Compose validation
        run: touch .env
      - name: Validate Docker Compose config
        run: docker compose config --quiet
      - name: Build Docker image
        run: docker build -t memgentic -f Dockerfile .

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install dependencies
        run: cd dashboard && npm ci
      - name: Lint
        run: cd dashboard && npm run lint
      - name: Type check + build
        run: cd dashboard && npx next build
      - name: Run tests
        run: cd dashboard && npx vitest run --passWithNoTests

  rust:
    name: Rust (memgentic-native)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: memgentic-native
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: memgentic-native
      - name: Format check
        run: cargo fmt --all -- --check
      - name: Clippy (no warnings allowed)
        run: cargo clippy --all-targets -- -D warnings
      - name: Build (with extension-module — wheel layout)
        run: cargo build --release
      - name: Test (no extension-module — link to libpython)
        run: cargo test --release --no-default-features
