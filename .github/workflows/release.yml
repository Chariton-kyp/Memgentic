name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write  # required for trusted publishing
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: memgentic
        run: uv sync --all-extras

      - name: Run tests
        timeout-minutes: 10
        working-directory: memgentic
        run: |
          uv pip install pytest-timeout
          uv run python -m pytest tests/ -q \
            --timeout=30 --timeout-method=thread \
            --ignore=tests/test_benchmarks.py \
            --ignore=tests/test_daemon.py \
            --ignore=tests/test_mcp_server.py \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_observability.py \
            --ignore=tests/test_embedder.py \
            --ignore=tests/test_pipeline.py \
            --ignore=tests/test_init_wizard.py

      - name: Build package
        working-directory: memgentic
        run: uv build --package memgentic --out-dir dist

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: memgentic/dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/memgentic
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
