name: Release memgentic to PyPI

# Fires on every vX.Y.Z tag push. Publishes ONLY the `memgentic` core
# package. `memgentic-api` has its own workflow (release-api.yml) fired
# by `api-v*` tags so the two packages can release independently.
#
# Trusted Publishing (OIDC) — no PAT or password secret required.
# Precondition: PyPI project "memgentic" already has a Trusted Publisher
# configured for owner=Chariton-kyp, repo=Memgentic,
# workflow=release.yml, environment=pypi. Do not rename the environment
# without updating the PyPI publisher entry first — the OIDC claim check
# is strict.
on:
  push:
    tags:
      - "v*"
  # Manual re-fire for tags that already exist but whose tag-push event
  # was suppressed by GitHub's GITHUB_TOKEN recursive-workflow guard (see
  # release-please.yml comment). Provide the exact tag name — the
  # verify-version step cross-checks it against __version__.py.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.7.0)"
        required: true
        type: string

permissions:
  contents: read   # base — jobs escalate as needed

# ``TAG_NAME`` normalises the tag across trigger types: ``push`` sets
# ``github.ref_name`` to the tag; ``workflow_dispatch`` feeds the
# ``tag`` input. Every step below reads ``$TAG_NAME`` so the two paths
# behave identically.
env:
  TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

# Prevent double-publish if the same tag is somehow pushed twice.
concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false   # don't cancel an in-progress publish

jobs:
  # ── 1. Version Guard ────────────────────────────────────────────────────────
  # Fail fast if the pushed tag (e.g. v0.5.0) doesn't match
  # memgentic/memgentic/__version__.py — prevents accidental mismatched tags.
  verify-version:
    name: Verify tag matches __version__.py
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Check version matches tag
        run: |
          TAG="${TAG_NAME}"           # e.g. v0.5.0
          VERSION="${TAG#v}"                 # strip leading 'v' → 0.5.0
          FILE_VERSION=$(python -c "
          import ast, sys
          with open('memgentic/memgentic/__version__.py') as f:
              tree = ast.parse(f.read())
          for node in ast.walk(tree):
              if isinstance(node, ast.Assign):
                  for t in node.targets:
                      if isinstance(t, ast.Name) and t.id == '__version__':
                          print(ast.literal_eval(node.value))
                          sys.exit(0)
          sys.exit(1)
          ")
          echo "Tag version : $VERSION"
          echo "File version: $FILE_VERSION"
          if [ "$VERSION" != "$FILE_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match __version__.py ('$FILE_VERSION'). Aborting."
            exit 1
          fi

      - name: Check version not already on PyPI
        run: |
          TAG="${TAG_NAME}"
          VERSION="${TAG#v}"
          python3 - "$VERSION" <<'PYEOF'
          import sys, json, urllib.request, urllib.error
          version = sys.argv[1]
          try:
              with urllib.request.urlopen(
                  "https://pypi.org/pypi/memgentic/json", timeout=15
              ) as r:
                  data = json.load(r)
              if version in data.get("releases", {}):
                  sys.stderr.write(
                      f"::error::memgentic=={version} already on PyPI. Refusing to re-publish.\n"
                  )
                  sys.exit(1)
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise
          print(f"OK — memgentic=={version} not yet on PyPI")
          PYEOF

  # ── 2. Build ────────────────────────────────────────────────────────────────
  build:
    name: Build sdist + wheel
    needs: verify-version
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "latest"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install workspace dependencies
        run: uv sync --dev

      - name: Run core tests
        timeout-minutes: 10
        run: |
          uv run pytest memgentic/tests/ -q \
            --timeout=30 --timeout-method=thread \
            --ignore=memgentic/tests/test_benchmarks.py \
            --ignore=memgentic/tests/test_daemon.py \
            --ignore=memgentic/tests/test_mcp_server.py \
            --ignore=memgentic/tests/test_integration.py \
            --ignore=memgentic/tests/test_observability.py \
            --ignore=memgentic/tests/test_embedder.py \
            --ignore=memgentic/tests/test_pipeline.py \
            --ignore=memgentic/tests/test_init_wizard.py

      - name: Build memgentic (core only — memgentic-api has its own workflow)
        run: uv build --package memgentic --out-dir dist/

      - name: List dist artifacts
        run: ls -lh dist/

      - name: Generate SBOM (CycloneDX)
        run: |
          uv pip install --system cyclonedx-bom
          mkdir -p sbom
          TAG="${TAG_NAME}"
          VERSION="${TAG#v}"
          cyclonedx-py environment \
            --output-format json \
            --output-file "sbom/sbom-memgentic-${VERSION}.cdx.json" \
            --spec-version 1.6 \
            .
          ls -lh sbom/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          if-no-files-found: error

  # ── 3. Publish ──────────────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write      # OIDC token for Trusted Publishing
      attestations: write  # build provenance attestation
    environment:
      name: pypi           # must match PyPI trusted-publisher environment name
      url: https://pypi.org/p/memgentic
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

  # ── 4. GitHub Release ───────────────────────────────────────────────────────
  # Extracts the matching ## [X.Y.Z] section from CHANGELOG.md as the body.
  # Falls back to "See CHANGELOG.md" if the section is missing.
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write      # create releases + upload assets
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/
          cp sbom/*.cdx.json release-assets/
          ls -lh release-assets/

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          TAG="${TAG_NAME}"       # v0.6.0
          VERSION="${TAG#v}"             # 0.6.0

          # Pass VERSION as argv[1] to avoid shell-expansion games inside a
          # quoted heredoc; keeps the Python body hermetic.
          BODY=$(python3 - "$VERSION" <<'PYEOF'
          import re
          import sys
          import pathlib

          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text()

          # Match "## [0.6.0]" with optional date / title suffix, capture body
          # up to (but not including) the next "## " heading or end-of-file.
          pattern = (
              r"^##\s+\[" + re.escape(version) + r"\][^\n]*\n"
              r"(.*?)"
              r"(?=^##\s|\Z)"
          )
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if m:
              body = m.group(1).strip()
              print(body if body else "See CHANGELOG.md")
          else:
              print("See CHANGELOG.md")
          PYEOF
          )

          # Store multi-line body as a step output via heredoc delimiter
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}  # e.g. v0.6.0-rc.1
