name: Release to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: memgentic
        run: uv sync --all-extras

      - name: Run tests
        timeout-minutes: 10
        working-directory: memgentic
        run: |
          uv pip install pytest-timeout
          uv run python -m pytest tests/ -q \
            --timeout=30 --timeout-method=thread \
            --ignore=tests/test_benchmarks.py \
            --ignore=tests/test_daemon.py \
            --ignore=tests/test_mcp_server.py \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_observability.py \
            --ignore=tests/test_embedder.py \
            --ignore=tests/test_pipeline.py \
            --ignore=tests/test_init_wizard.py

      - name: Build package
        working-directory: memgentic
        run: uv build --package memgentic --out-dir dist

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: memgentic/dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      attestations: write
    environment:
      name: pypi
      url: https://pypi.org/p/memgentic
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "dist/*"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: dist/*
          fail_on_unmatched_files: true
