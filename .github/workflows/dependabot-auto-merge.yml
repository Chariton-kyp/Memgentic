name: Dependabot auto-merge

# Auto-approves + auto-merges Dependabot PRs that bump a dep by a
# PATCH version only. MINOR and MAJOR bumps require a human review —
# standard pattern for a solo-maintainer repo where patches are
# generally safe but any API-surface change deserves eyeballs.
#
# Why ``RELEASE_PLEASE_TOKEN`` and not ``GITHUB_TOKEN``?
# ``main`` branch protection requires a **code-owner** approval per
# CODEOWNERS (@Chariton-kyp). ``gh pr review --approve`` with
# ``GITHUB_TOKEN`` posts the approval as ``github-actions[bot]``,
# which does not satisfy the code-owner gate → auto-merge stalls on
# otherwise-safe patch bumps. Using a PAT owned by @Chariton-kyp
# posts the approval as the owner, which satisfies CODEOWNERS. Same
# secret as release-please.yml; no extra secret to manage.

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    name: Auto-merge patch updates
    runs-on: ubuntu-24.04
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Approve patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          # PAT so the approval is posted as the code-owner, not as
          # github-actions[bot]. See workflow-level comment.
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr review --approve "$PR_URL"

      - name: Enable auto-merge for patch updates
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --auto --squash "$PR_URL"
