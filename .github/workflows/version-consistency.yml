name: Version consistency

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: All packages agree on version
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Check version consistency
        run: python scripts/check_version_consistency.py

      - name: Check CHANGELOG / manifest drift
        run: python scripts/check_changelog_drift.py
