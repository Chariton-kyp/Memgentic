name: Release memgentic-api to PyPI

on:
  push:
    tags:
      - "api-v*"

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: memgentic-api
        run: uv sync --all-extras

      - name: Run tests
        timeout-minutes: 10
        working-directory: memgentic-api
        run: |
          uv pip install pytest-timeout
          uv run python -m pytest tests/ -q \
            --timeout=60 --timeout-method=thread

      - name: Build package
        working-directory: memgentic-api
        run: uv build --package memgentic-api --out-dir dist

      - name: Generate SBOM (CycloneDX)
        working-directory: memgentic-api
        run: |
          uv pip install --system cyclonedx-bom
          mkdir -p sbom
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#api-v}"
          cyclonedx-py environment \
            --output-format json \
            --output-file "sbom/sbom-memgentic-api-${VERSION}.cdx.json" \
            --spec-version 1.6 \
            .
          ls -lh sbom/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: memgentic-api/dist/
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: memgentic-api/sbom/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write
      attestations: write
    environment:
      name: pypi-api
      url: https://pypi.org/p/memgentic-api
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

  release:
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/
          cp sbom/*.cdx.json release-assets/
          ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: true
