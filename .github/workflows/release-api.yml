name: Release memgentic-api to PyPI

on:
  push:
    tags:
      - "api-v*"
  # Manual re-fire for tags whose push event was suppressed by
  # GITHUB_TOKEN's recursive-workflow guard. See release-please.yml.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. api-v0.7.0)"
        required: true
        type: string

permissions:
  contents: read   # base — jobs escalate as needed

env:
  TAG_NAME: ${{ github.event.inputs.tag || github.ref_name }}

concurrency:
  group: release-api-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # ── 1. Version guard ────────────────────────────────────────────────
  # Fail fast if the pushed tag (e.g. api-v0.7.0) doesn't match
  # memgentic-api/pyproject.toml — prevents publishing the wrong version.
  verify-version:
    name: Verify tag matches pyproject.toml
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Check version matches tag
        run: |
          TAG="${TAG_NAME}"               # api-v0.7.0
          VERSION="${TAG#api-v}"                 # 0.7.0
          FILE_VERSION=$(python3 -c "
          import tomllib, pathlib
          data = tomllib.loads(pathlib.Path('memgentic-api/pyproject.toml').read_text())
          print(data['project']['version'])
          ")
          INIT_VERSION=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('memgentic-api/memgentic_api/__init__.py').read_text()
          m = re.search(r'__version__\s*=\s*[\x22\x27]([^\x22\x27]+)[\x22\x27]', text)
          print(m.group(1) if m else '')
          ")
          echo "Tag version : $VERSION"
          echo "pyproject   : $FILE_VERSION"
          echo "__init__.py : $INIT_VERSION"
          if [ "$VERSION" != "$FILE_VERSION" ] || [ "$VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Tag '$TAG' does not match in-tree version. Aborting."
            exit 1
          fi

      - name: Check version not already on PyPI
        run: |
          TAG="${TAG_NAME}"
          VERSION="${TAG#api-v}"
          python3 - "$VERSION" <<'PYEOF'
          import sys, json, urllib.request, urllib.error
          version = sys.argv[1]
          try:
              with urllib.request.urlopen(
                  "https://pypi.org/pypi/memgentic-api/json", timeout=15
              ) as r:
                  data = json.load(r)
              if version in data.get("releases", {}):
                  sys.stderr.write(
                      f"::error::memgentic-api=={version} already on PyPI. Refusing to re-publish.\n"
                  )
                  sys.exit(1)
          except urllib.error.HTTPError as e:
              # 404 on first publish is fine.
              if e.code != 404:
                  raise
          print(f"OK — memgentic-api=={version} not yet on PyPI")
          PYEOF

  # ── 2. Build ────────────────────────────────────────────────────────
  build:
    name: Build sdist + wheel + SBOM
    needs: verify-version
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: memgentic-api
        run: uv sync --all-extras

      - name: Run tests
        timeout-minutes: 10
        working-directory: memgentic-api
        run: |
          uv pip install pytest-timeout
          uv run python -m pytest tests/ -q \
            --timeout=60 --timeout-method=thread

      - name: Build package
        working-directory: memgentic-api
        run: uv build --package memgentic-api --out-dir dist

      - name: Generate SBOM (CycloneDX)
        working-directory: memgentic-api
        run: |
          # PEP 668 guard on Ubuntu 24.04 — see matching comment in
          # release.yml. Install into the project-local ``.venv`` (created
          # by the earlier ``uv sync`` step above) and invoke via
          # ``uv run``.
          uv pip install cyclonedx-bom
          mkdir -p sbom
          TAG="${TAG_NAME}"
          VERSION="${TAG#api-v}"
          uv run cyclonedx-py environment \
            --output-format json \
            --output-file "sbom/sbom-memgentic-api-${VERSION}.cdx.json" \
            --spec-version 1.6 \
            .venv
          ls -lh sbom/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: memgentic-api/dist/
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: memgentic-api/sbom/
          if-no-files-found: error

  # ── 3. Publish ──────────────────────────────────────────────────────
  publish:
    name: Publish to PyPI (Trusted Publishing)
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      id-token: write      # OIDC for Trusted Publishing
      attestations: write  # SLSA provenance
    environment:
      name: pypi-api       # must match PyPI trusted-publisher environment
      url: https://pypi.org/p/memgentic-api
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/*.whl
            dist/*.tar.gz

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          attestations: true

  # ── 4. GitHub Release ───────────────────────────────────────────────
  # Extracts the matching ## [X.Y.Z] section from memgentic-api/CHANGELOG.md
  # (maintained by release-please) so the release body matches exactly what
  # release-please generated, instead of a re-computed "auto" note.
  github-release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ env.TAG_NAME }}

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: sbom
          path: sbom/

      - name: Assemble release assets
        run: |
          mkdir -p release-assets
          cp dist/*.whl dist/*.tar.gz release-assets/
          cp sbom/*.cdx.json release-assets/
          ls -lh release-assets/

      - name: Extract CHANGELOG section
        id: changelog
        run: |
          TAG="${TAG_NAME}"         # api-v0.6.0
          VERSION="${TAG#api-v}"           # 0.6.0

          # Try package-local CHANGELOG first (written by release-please);
          # fall back to the root CHANGELOG.md if the per-package one is
          # absent (monorepo linked-version config may emit either shape).
          CHANGELOG_PATH="memgentic-api/CHANGELOG.md"
          if [ ! -f "$CHANGELOG_PATH" ]; then
            CHANGELOG_PATH="CHANGELOG.md"
          fi

          BODY=$(python3 - "$VERSION" "$CHANGELOG_PATH" <<'PYEOF'
          import re, sys, pathlib
          version = sys.argv[1]
          path = pathlib.Path(sys.argv[2])
          text = path.read_text() if path.exists() else ""
          pattern = (
              r"^##\s+\[" + re.escape(version) + r"\][^\n]*\n"
              r"(.*?)"
              r"(?=^##\s|\Z)"
          )
          m = re.search(pattern, text, re.MULTILINE | re.DOTALL)
          if m:
              body = m.group(1).strip()
              print(body if body else "See CHANGELOG.md")
          else:
              print("See CHANGELOG.md")
          PYEOF
          )

          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          files: release-assets/*
          fail_on_unmatched_files: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
