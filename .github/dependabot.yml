version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: "pip"
    # Workspace layout — root ``pyproject.toml`` + root ``uv.lock`` hold
    # the fully-resolved versions across all member packages
    # (``memgentic/``, ``memgentic-api/``, ``memgentic-native/``). Earlier
    # per-member ``/memgentic`` + ``/memgentic-api`` entries scanned bare
    # ``pyproject.toml`` files with no lock alongside, so transitive-only
    # vulns (like the lxml XXE CVE fixed in #81) weren't auto-PR'd.
    # Single root entry covers everything.
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      python-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      python-security:
        applies-to: security-updates
        patterns: ["*"]

  # Removed: per-member ``pip`` entries for ``/memgentic`` and
  # ``/memgentic-api``. The root entry above covers every workspace
  # member because uv writes a single ``uv.lock`` at the repo root.

  - package-ecosystem: "cargo"
    directory: "/memgentic-native"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "rust"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      rust-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
    ignore:
      # pyo3 majors (0.x → 0.y) carry breaking API renames (PyObject moved
      # in 0.28, Bound/Py smart-pointer rework, etc.). Each bump needs a
      # dedicated migration PR, not an auto-open. Revisit when we schedule
      # the migration.
      - dependency-name: "pyo3"
        update-types: ["version-update:semver-major", "version-update:semver-minor"]

  - package-ecosystem: "npm"
    directory: "/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "javascript"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      dashboard-minor-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
      dashboard-security:
        applies-to: security-updates
        patterns: ["*"]
    ignore:
      - dependency-name: "next"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Athens"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
