# Pre-commit hooks for Memgentic
#
# Install once after clone:
#   pip install pre-commit
#   pre-commit install
#   pre-commit install --hook-type commit-msg
#
# Run on demand:
#   pre-commit run --all-files

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$|^dashboard/public/.*\.svg$'
      - id: end-of-file-fixer
        exclude: '\.md$|^dashboard/public/.*\.svg$'
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-toml
      - id: check-json
        exclude: '^dashboard/.*\.json$'
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
        exclude: '^memgentic/tests/test_scrubber\.py$'
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.5
    hooks:
      - id: ruff
        name: ruff (lint)
        args: [--fix]
      - id: ruff-format
        name: ruff (format)

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.5.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - --types=feat,fix,perf,revert,refactor,docs,test,tests,build,ci,chore,style,security,dx
          - --strict

  # Pyright is selective on purpose: it runs on release tooling and
  # new boundary scripts, not on the whole core codebase (which has
  # pre-existing typing debt that's out of scope for this hook).
  # Expand `files:` deliberately when a module is cleaned up.
  - repo: https://github.com/RobertCraigie/pyright-python
    rev: v1.1.402
    hooks:
      - id: pyright
        files: '^scripts/.*\.py$'
        additional_dependencies: []
